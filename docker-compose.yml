services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"   # host access
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: INTERNAL for Docker-to-Docker, EXTERNAL for host
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  init-kafka:
    image: apache/kafka:latest
    container_name: init-kafka
    depends_on:
      - broker
    # Use the INTERNAL listener (broker:29092) — avoids the localhost redirect problem
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for broker...';
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --list; do
          sleep 2;
        done;
        echo 'Creating topic job-progress...';
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --create --if-not-exists --topic job-progress --partitions 3 --replication-factor 1;
        echo 'Done. Topics:';
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --list;
      "
    restart: "no"
